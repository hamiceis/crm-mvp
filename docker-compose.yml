services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-simple-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: crm_simple
    volumes:
      - crm_pgdata:/var/lib/postgresql/data

volumes:
  crm_pgdata:
